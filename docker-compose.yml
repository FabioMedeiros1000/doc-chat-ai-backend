version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    expose:
      - "6333"
      - "6334"
      - "6335"
    volumes:
      # Dados do Qdrant
      - ./qdrant_data:/qdrant/storage

      # Pasta de config no host -> pasta de config no container
      # Dentro de ./qdrant_config você coloca o arquivo production.yaml
      - ./qdrant_config:/qdrant/config
